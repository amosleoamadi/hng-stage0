<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="main-container">
      <div class="page-wrapper">
        <h1>Frontend Wizards - Stage 0</h1>

        <article class="todo-card" data-testid="test-todo-card">
          <div class="todo-header">
            <div class="todo-title-section">
              <input
                type="checkbox"
                id="todo-checkbox"
                class="todo-checkbox"
                data-testid="test-todo-complete-toggle"
              />
              <label
                for="todo-checkbox"
                class="todo-title"
                data-testid="test-todo-title"
              >
                Complete project documentation
              </label>
            </div>
            <span
              class="todo-priority"
              data-testid="test-todo-priority"
              aria-label="Priority: High"
              >High</span
            >
          </div>

          <p class="todo-description" data-testid="test-todo-description">
            Write comprehensive README and API docs for the entire project.
          </p>

          <div class="todo-meta">
            <div class="meta-item">
              <span class="meta-label">Due:</span>
              <time
                class="todo-due-date"
                datetime="2026-03-01T18:00:00"
                data-testid="test-todo-due-date"
              >
                Mar 1, 2026
              </time>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status:</span>
              <span class="todo-status" data-testid="test-todo-status"
                >In Progress</span
              >
            </div>
          </div>

          <div class="todo-time-remaining">
            <time
              class="time-remaining-text"
              aria-live="polite"
              data-testid="test-todo-time-remaining"
            >
              Calculating...
            </time>
          </div>

          <div class="todo-tags" data-testid="test-todo-tags" role="list">
            <span class="tag" data-testid="test-todo-tag-work" role="listitem"
              >work</span
            >
            <span class="tag" data-testid="test-todo-tag-urgent" role="listitem"
              >urgent</span
            >
          </div>

          <div class="todo-actions">
            <button
              class="btn btn-edit"
              data-testid="test-todo-edit-button"
              aria-label="Edit task"
            >
              Edit
            </button>
            <button
              class="btn btn-delete"
              data-testid="test-todo-delete-button"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </article>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
